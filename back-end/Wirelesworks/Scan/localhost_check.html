<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localhost WebSocket Check</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
    h1 { margin-bottom: 8px; }
    .muted { color: #94a3b8; margin-top: 0; }
    .row { margin: 12px 0; }
    #status { font-weight: 700; }
    .ok { color: #22c55e; }
    .bad { color: #ef4444; }
    .box { background: #111827; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
    #messages { max-height: 70vh; overflow: auto; white-space: pre-wrap; font-family: Consolas, monospace; }
    button { background: #2563eb; border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>WebSocket Localhost Checker</h1>
  <p class="muted">Connects to <strong>ws://localhost:8765</strong> and prints messages as they arrive.</p>

  <div class="row">Status: <span id="status" class="bad">Disconnected</span></div>
  <div class="row"><button id="clearBtn">Clear Output</button></div>

  <div class="box">
    <div id="messages"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const clearBtn = document.getElementById('clearBtn');

    let socket;

    function appendMessage(text) {
      const line = document.createElement('div');
      line.textContent = text;
      messagesEl.appendChild(line);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function connect() {
      socket = new WebSocket('ws://localhost:8765');

      socket.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'ok';
        appendMessage('✅ Connected to ws://localhost:8765');
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          appendMessage(`\n[${new Date().toLocaleTimeString()}] ${data.type || 'message'}\n${JSON.stringify(data, null, 2)}`);
        } catch {
          appendMessage(`\n[${new Date().toLocaleTimeString()}] raw\n${event.data}`);
        }
      };

      socket.onclose = () => {
        statusEl.textContent = 'Disconnected (retrying...)';
        statusEl.className = 'bad';
        appendMessage('❌ Disconnected. Retrying in 2s...');
        setTimeout(connect, 2000);
      };

      socket.onerror = () => {
        statusEl.textContent = 'Error';
        statusEl.className = 'bad';
      };
    }

    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
    });

    connect();
  </script>
</body>
</html>
