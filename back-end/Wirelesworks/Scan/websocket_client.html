<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLE Scanner Monitor</title>

<style>
body{
    font-family: monospace;
    background:#0a0a0a;
    color:#00ff00;
    padding:20px;
}

h1{
    text-align:center;
}

#status{
    padding:10px;
    margin-bottom:20px;
    border:1px solid #00ff00;
}

.device{
    border-left:3px solid #00ff00;
    padding:8px;
    margin-bottom:5px;
    background:#111;
}

.timestamp{
    color:#888;
    font-size:12px;
}
</style>

</head>

<body>

<h1>BLE Scanner</h1>

<div id="status">Connecting...</div>

<h2>Scan Output</h2>
<pre id="devices"></pre>

<script>

const ROUTER_IP = "10.245.13.18";
const ws = new WebSocket(`ws://${ROUTER_IP}:8765`);

const status = document.getElementById("status");
const devicesDiv = document.getElementById("devices");

ws.onopen = () => {
    status.innerText = "Connected to scanner";
};

ws.onclose = () => {
    status.innerText = "Disconnected";
};

ws.onerror = () => {
    status.innerText = "WebSocket error";
};

ws.onmessage = (event) => {
    const payload = event.data;

    devicesDiv.textContent += payload;
    if(!payload.endsWith("\n")){
        devicesDiv.textContent += "\n";
    }
    devicesDiv.scrollTop = devicesDiv.scrollHeight;
};

</script>

</body>
</html>
