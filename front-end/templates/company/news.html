<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>News</title>
	<link rel="stylesheet" href="/static/css/company/news.css">
</head>
<body>
	{% include 'header.html' %}
	<main>
		<section class="news-page" aria-label="News">
			<div class="social-strip">
				<a class="social-pill" href="#" aria-label="Instagram">Instagram</a>
				<a class="social-pill" href="#" aria-label="LinkedIn">LinkedIn</a>
			</div>

			<section class="posts" aria-label="News posts">
				{% for post in posts %}
					<article class="post-card">
						<h2>{{ post.title }}</h2>
						<p class="post-meta">by {{ post.author }} | {{ post.date }} | {{ post.category }}</p>
						<p class="post-excerpt">{{ post.excerpt }}</p>
						<a class="read-more" href="{{ post.link }}">read more</a>
					</article>
				{% endfor %}
			</section>

			
	</main>
	{% include 'footer.html' %}
	<script src="/static/js/header.js"></script>
</body>
</html>
